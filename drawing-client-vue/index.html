<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vue gRPC Drawing Client — Dev</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 2rem;
      background: #f5f5f5;
    }
    h1 { color: #333; }
  </style>
</head>
<body>
  <h1>Vue gRPC Drawing Client (dev)</h1>
  <p>
    The <code>&lt;vuejs-grpc-client&gt;</code> custom element below connects
    to the gRPC Drawing Service and renders the scene on a canvas.
  </p>

  <vuejs-grpc-client
    service-url="https://localhost:5001"
    scene="landschap"
    width="800"
    height="600">
  </vuejs-grpc-client>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
